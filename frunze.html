<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAZA SHOP - Фрунзенский</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #00838f; --wa: #25d366; }
        body { font-family: 'Montserrat', sans-serif; background: #f4f7f6; margin: 0; padding-bottom: 90px; }
        
        .header { background: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--main); position: sticky; top: 0; z-index: 100; }
        .header h1 { color: var(--main); margin: 0; font-size: 18px; text-transform: uppercase; }

        /* Категориялар */
        .categories { 
            display: flex; overflow-x: auto; padding: 10px; gap: 10px; 
            background: white; white-space: nowrap; border-bottom: 1px solid #eee;
        }
        .cat-btn { 
            padding: 8px 15px; background: #f0f0f0; border-radius: 20px; 
            border: none; font-size: 12px; font-weight: 600; cursor: pointer;
        }
        .cat-btn.active { background: var(--main); color: white; }

        .container { padding: 15px; max-width: 450px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .card { background: white; border-radius: 15px; padding: 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.03); display: flex; flex-direction: column; }
        .card img { width: 100%; height: 110px; object-fit: contain; background: #f9f9f9; border-radius: 8px; }
        .name { font-size: 12px; font-weight: 600; margin: 8px 0; height: 32px; overflow: hidden; line-height: 1.2; }
        .price { font-size: 14px; font-weight: 700; color: #2e7d32; margin-bottom: 8px; }
        
        .add-btn { 
            background: var(--main); color: white; border: none; width: 100%;
            padding: 8px; border-radius: 8px; font-weight: 700; font-size: 11px; cursor: pointer;
        }

        /* Корзина панели */
        .cart-panel { 
            position: fixed; bottom: 0; width: 100%; max-width: 500px; 
            background: white; padding: 15px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            display: none; justify-content: space-between; align-items: center; z-index: 200;
        }
        .order-btn { 
            background: var(--wa); color: white; text-decoration: none;
            padding: 12px 20px; border-radius: 12px; font-weight: 700; font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Таза Шоп • Фрунзенский</h1>
    </div>

    <div class="categories" id="catList">
        <button class="cat-btn active" onclick="filterCat('all', this)">Баары</button>
        <button class="cat-btn" onclick="filterCat('тиш', this)">Тиш жуучу</button>
        <button class="cat-btn" onclick="filterCat('кир', this)">Кир жуучу</button>
        <button class="cat-btn" onclick="filterCat('идиш', this)">Идиш жуучу</button>
    </div>

    <div class="container">
        <div class="grid" id="products"></div>
    </div>

    <div class="cart-panel" id="cartPanel">
        <div><span id="cartCount">0</span> товар | <b id="cartTotal">0</b> сом</div>
        <a href="#" class="order-btn" onclick="sendOrder()">Заказ берүү (WA)</a>
    </div>

    <script>
        const phone = "996755008422"; // Өзүңүздүн номериңизди жазыңыз
        let cart = [];

        // ТОВАРЛАРДЫН ТИЗМЕСИ (category кошулду)
        const productsList = [
            { id: 1, category: "кир", name: "Порошок Tide 3кг", price: 450, img: "logo.jpg" },
            { id: 2, category: "идиш", name: "Fairy 450мл", price: 120, img: "logo.jpg" },
            { id: 3, category: "тиш", name: "Colgate тиш пастасы", price: 110, img: "logo.jpg" },
            { id: 4, category: "тиш", name: "Oral-B тиш щеткасы", price: 95, img: "logo.jpg" },
            { id: 5, category: "кир", name: "Ariel автомат 1.5кг", price: 320, img: "logo.jpg" }
        ];

        function renderProducts(filter = 'all') {
            const grid = document.getElementById('products');
            grid.innerHTML = "";
            
            const filtered = filter === 'all' ? productsList : productsList.filter(p => p.category === filter);
            
            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="card">
                        <img src="${p.img}">
                        <div class="name">${p.name}</div>
                        <div class="price">${p.price} сом</div>
                        <button class="add-btn" onclick="addToCart(${p.id})">Корзинага +</button>
                    </div>
                `;
            });
        }

        function filterCat(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderProducts(cat);
        }

        function addToCart(id) {
            const product = productsList.find(p => p.id === id);
            cart.push(product);
            updateCart();
        }

        function updateCart() {
            const panel = document.getElementById('cartPanel');
            panel.style.display = 'flex';
            document.getElementById('cartCount').innerText = cart.length;
            document.getElementById('cartTotal').innerText = cart.reduce((sum, p) => sum + p.price, 0);
        }

        function sendOrder() {
            let text = "Саламатсызбы! Фрунзенский филиалынан заказ:\n\n";
            cart.forEach((p, i) => text += `${i+1}. ${p.name} - ${p.price} сом\n`);
            text += `\nЖалпы сумма: ${document.getElementById('cartTotal').innerText} сом`;
            window.location.href = `https://wa.me/${phone}?text=${encodeURIComponent(text)}`;
        }

        renderProducts();
    </script>
</body>
</html>
